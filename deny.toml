# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
version = 2
# GAP-SSH-DEP-002 (0.3.8): russh 0.62.x + stack crypto estável; sem waiver de CVE/yanked.
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
]
confidence-threshold = 0.8

[bans]
# GAP-SSH-DENY-002 (0.4.0): duplicates (aead/chacha20/cipher/…) are transitive
# from russh 0.62 + chacha20poly1305 0.10 dual stacks — warn only, not ignore CVE.
# Fail only on wildcards and forbidden native TLS/OpenSSL stacks.
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { name = "openssl-sys" },
    { name = "libssh2-sys" },
    { name = "native-tls" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
